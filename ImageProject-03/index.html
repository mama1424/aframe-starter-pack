<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="forest" src="Assets/Forest.glb"></a-asset-item>

        <a-asset-item id="butterfly" src="Assets/butterfly.glb"></a-asset-item>
        <a-asset-item id="bear" src="Assets/bear.glb"></a-asset-item>

        <img id="sky" src="Assets/sky.jpg">
        <img id="ground" src="Assets/ground.jpg">
      </a-assets>

      <a-sky src="#sky"></a-sky>

      <a-text value="Friends of the Forest" position="-4 5 -8" width="20"></a-text>
      <a-plane src="#ground" rotation="-90 0 0" height="100" width="100" repeat="50 50"></a-plane>

      <a-entity gltf-model="#forest" position="-6 2 -12" scale="5 5 5 "></a-entity>
      <a-entity gltf-model="#forest" position="8 2 -12" scale="5 5 5"></a-entity>
      <a-entity gltf-model="#forest" position="6 2 12" scale="5 5 5"></a-entity>
      <a-entity gltf-model="#forest" position="-4 2 10" scale="5 5 5"></a-entity>
      <a-entity gltf-model="#forest" position="-12 2 0" rotation="0 90 0" scale="5 5 5"></a-entity>
      <a-entity gltf-model="#forest" position="12 2 0" rotation="0 -90 0" scale="5 5 5"></a-entity>

      <a-entity gltf-model="#butterfly" position="0 2 -4" scale="0.04 0.04 0.04" animation="property: position; to: 2 3 -6; dir: alternate; loop: true; dur: 3000" animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-entity>
      <a-entity gltf-model="#butterfly" position="-1 2 -5" scale="0.03 0.03 0.03" animation="property: position; to: 0 2 -4; dir: alternate; loop: true; dur: 2500"></a-entity>
      <a-entity gltf-model="#butterfly" position="-6 2 -2" scale="0.03 0.03 0.03" animation="property: position; to: -5 2 -3; dir: alternate; loop: true; dur: 3000" animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-entity>

      <a-entity gltf-model="#bear" position="0 0.5 8" scale="0.01 0.01 0.01" rotation="0 270 0"></a-entity>
      <a-entity gltf-model="#bear" position="6 0 0" scale="0.01 0.01 0.01" rotation="0 -9 0"></a-entity>

      <a-light type="ambient" color="#555"></a-light>
      <a-light type="point" color="#88ff88" intensity="2" position="0 3 -5"></a-light>

    
    </a-scene>
  </body>
</html>
