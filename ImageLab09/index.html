<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!--a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box (commented out bc didnt need)-->
      <a-sphere position="0 1.25 -5" radius="1.25" color="#ffffff"></a-sphere>  <!-- big sphere -->
      <a-sphere position="0 3 -5" radius="1" color="#ffffff"></a-sphere> <!-- medium sphere -->
      <a-sphere position="0 4.7 -5" radius=".75" color="#ffffff"></a-sphere> <!-- small sphere -->
      <a-cylinder position="0 4.5 -4" radius="0.1" height=".5" color="#FFA500" rotation="-90 0 0"></a-cylinder> <!-- nose -->
      <a-sphere position="-0.3 4.7 -4" radius="0.1" color="#000"></a-sphere> <!-- left eye -->
      <a-sphere position="0.3 4.7 -4" radius="0.1" color="#000"></a-sphere> <!-- right eye -->
      <a-plane position="0 0.1 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset:dream;dressingAmount: 500"></a-entity>
    </a-scene>
  </body>
</html>
